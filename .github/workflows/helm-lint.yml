name: Helm lint

on:
  pull_request:
    paths:
      - 'helm/*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run:
    name: 'lint'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: azure/setup-helm@v4.3.0
      - name: Run helm lint
        run: helm lint ./helm
