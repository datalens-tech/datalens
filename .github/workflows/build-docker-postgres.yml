name: Build Docker PostgreSQL

on:
  push:
    branches:
      - main
    paths:
      - 'postgres/*'
  workflow_dispatch:
    inputs:
      pg_version:
        type: string
        default: '16'
        description: 'PostgreSQL main version'
      pg_version_suffix:
        type: string
        default: '0.2.0'
        description: 'Container custom version suffix'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: datalens-tech/datalens-postgres
  POSTGRES_VERSION: ${{ github.event.inputs.pg_version || '16' }}
  POSTGRES_VERSION_SUFFIX: ${{ github.event.inputs.pg_version_suffix || '0.2.0' }}

jobs:
  run:
    name: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: 'arm64'
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.POSTGRES_VERSION }}
            type=raw,value=${{ env.POSTGRES_VERSION }}-${{ env.POSTGRES_VERSION_SUFFIX }}
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          build-args: |
            POSTGRES_VERSION=${{ env.POSTGRES_VERSION }}
          context: ./postgres
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
