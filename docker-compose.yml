services:
  postgres:
    container_name: datalens-postgres
    image: ghcr.io/datalens-tech/datalens-postgres:16
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "pg-us-db"]
      interval: 5s
      retries: 10
      start_period: 3s
    environment:
      HC: ${HC:-0}
      CONTROL_API_CRYPTO_KEY: "${CONTROL_API_CRYPTO_KEY}"
      US_ENDPOINT: http://us:8080
      POSTGRES_USER: pg-user
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      INIT_DEMO_DATA: 1
    volumes:
      - db-postgres:/var/lib/postgresql/data
    networks:
      - default
  #
  control-api:
    container_name: datalens-control-api
    image: ghcr.io/datalens-tech/datalens-control-api:0.2192.0
    environment:
      BI_API_UWSGI_WORKERS_COUNT: 4
      RQE_FORCE_OFF: 1
      RQE_SECRET_KEY: ""
      #
      DL_CRY_ACTUAL_KEY_ID: KEY
      DL_CRY_KEY_VAL_ID_KEY: "h1ZpilcYLYRdWp7Nk8X1M1kBPiUi8rdjz9oBfHyUKIk="
      #
      US_HOST: http://us:8080
      #
      US_MASTER_TOKEN: ${US_MASTER_TOKEN:-us-master-token}
      #
      CONNECTOR_AVAILABILITY_VISIBLE: clickhouse,postgres,chyt,ydb,mysql,greenplum,mssql,appmetrica_api,metrika_api
    depends_on:
      - us
    networks:
      - default
  #
  data-api:
    container_name: datalens-data-api
    image: ghcr.io/datalens-tech/datalens-data-api:0.2192.0
    environment:
      GUNICORN_WORKERS_COUNT: 5
      RQE_FORCE_OFF: 1
      CACHES_ON: 0
      MUTATIONS_CACHES_ON: 0
      RQE_SECRET_KEY: ""
      #
      DL_CRY_ACTUAL_KEY_ID: KEY
      DL_CRY_KEY_VAL_ID_KEY: "h1ZpilcYLYRdWp7Nk8X1M1kBPiUi8rdjz9oBfHyUKIk="
      #
      BI_COMPENG_PG_ON: 1
      BI_COMPENG_PG_URL: "postgresql://pg-user:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pg-compeng-db"
      #
      US_HOST: http://us:8080
      #
      US_MASTER_TOKEN: ${US_MASTER_TOKEN:-us-master-token}
    depends_on:
      - us
      - postgres
    networks:
      - default
  #
  us:
    container_name: datalens-us
    image: ghcr.io/datalens-tech/datalens-us:0.310.0
    environment:
      APP_INSTALLATION: opensource
      APP_ENV: prod
      #
      MASTER_TOKEN: ${US_MASTER_TOKEN:-us-master-token}
      #
      POSTGRES_DSN_LIST: "postgres://pg-user:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pg-us-db"
      #
      SKIP_INSTALL_DB_EXTENSIONS: 1
      USE_DEMO_DATA: 0
      #
      HC: ${HC:-0}
    depends_on:
      - postgres
    networks:
      - default
  #
  ui:
    container_name: datalens-ui
    image: ghcr.io/datalens-tech/datalens-ui:0.2601.0
    environment:
      APP_MODE: full
      APP_ENV: production
      APP_INSTALLATION: opensource
      #
      AUTH_POLICY: disabled
      #
      US_ENDPOINT: http://us:8080
      BI_API_ENDPOINT: http://control-api:8080
      BI_DATA_ENDPOINT: http://data-api:8080
      #
      US_MASTER_TOKEN: ${US_MASTER_TOKEN:-us-master-token}
      #
      RELEASE_VERSION: '1.17.0'
      #
      HC: ${HC:-0}
      YANDEX_MAP_ENABLED: ${YANDEX_MAP_ENABLED:-0}
      YANDEX_MAP_TOKEN: ${YANDEX_MAP_TOKEN}
    depends_on:
      - us
      - control-api
      - data-api
    ports:
      - 8080:8080
    networks:
      - default
#
volumes:
  db-postgres:
#
networks:
  default:
